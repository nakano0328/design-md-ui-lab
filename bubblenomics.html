<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎈 BUBBLENOMICS — バブルは、はじける直前がいちばん儲かる</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#150d33;}
  canvas{display:block;touch-action:none;cursor:crosshair;}
  *{-webkit-tap-highlight-color:transparent;user-select:none;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
'use strict';
/* =========================================================
   BUBBLENOMICS v2 〜バブルは、はじける直前がいちばん儲かる〜
   弾幕回避 × バブル経済 × ローグライトドラフト
   1ファイル・外部アセットなし
   ========================================================= */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W * DPR); cv.height = Math.floor(H * DPR);
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
}
window.addEventListener('resize', resize);
resize();

/* ---------- ユーティリティ ---------- */
const TAU = Math.PI * 2;
const R  = (a, b) => a + Math.random() * (b - a);
const RI = (a, b) => Math.floor(R(a, b + 1));
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
function lerpC(c1, c2, t){ return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)]; }
function rgb(c, a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a===undefined?1:a})`; }
function hsl2rgb(h, s, l){
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return (l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)))) * 255; };
  return [f(0), f(8), f(4)];
}
const FONT = '"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
const EMOJI = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
const F = (s, w) => `${w||'bold'} ${s}px ${FONT}`;
const yen = n => '¥' + Math.floor(n).toLocaleString('ja-JP');

/* ---------- ゲーム定数（バランス調整の中枢） ---------- */
const MINR = 16, MAXR = 95;
const START_R = 30;
const GRAZE = 26;                  // グレイズ基本余白
const VENT_SHRINK = 34;
const THRUST = 1050;
const SCORE_RATE = 60;
const QUARTER_SEC = 18;
const FEVER_DUR = 12;
const WIND_RANGE = 180;            // 噴射風がトゲに届く距離
const inflationRate = lv => Math.min(7 + (lv - 1) * 1.1, 16);
const multOf = r => (r / MINR) * (r / MINR);

const PINK = [255,126,182], GOLD = [255,209,102], RED = [255,77,109];
const LEVEL_MSG = {
  2: '狙撃針が資産を狙ってくる…！',
  3: '蛇行するトゲ市場、出現',
  5: 'インフレ加速！ふくらみが止まらない！',
  6: 'トゲの壁が迫る…隙間を抜けろ！',
  7: 'ここから先は、カオス相場。',
};

/* ---------- 投資戦略（ドラフトperk） ---------- */
const PERKS = [
  { id:'graze',  icon:'🧿', name:'広域スレスレ', persistent:true,
    desc:['グレイズ判定が','+8px 広がる'],           apply(){ grazeBonus += 8; } },
  { id:'vent',   icon:'💨', name:'省エネ噴射',   persistent:true,
    desc:['噴射で しぼむ量','−20%'],                 apply(){ ventEff *= 0.8; } },
  { id:'coin',   icon:'🪙', name:'高配当株',     persistent:true,
    desc:['配当ボーナス','+60%'],                    apply(){ coinMul *= 1.6; } },
  { id:'shield', icon:'🛡️', name:'保険契約',     persistent:true,
    desc:['崩壊を1回防ぐ（最大3）','※過熱崩壊は対象外'], apply(){ barrier = Math.min(3, barrier + 1); } },
  { id:'cool',   icon:'🧊', name:'金融引き締め', persistent:true,
    desc:['インフレ速度','−18%'],                    apply(){ inflMul *= 0.82; } },
  { id:'thrust', icon:'🚀', name:'追い風',       persistent:true,
    desc:['噴射の推力','+25%'],                      apply(){ thrustMul *= 1.25; } },
  { id:'magnet', icon:'🧲', name:'磁力資産',     persistent:true,
    desc:['コイン吸引範囲','+80px'],                 apply(){ magnetR += 80; } },
  { id:'cash',   icon:'💴', name:'一括利確',     persistent:false,
    desc:['いますぐ','¥2,000 × 現在倍率 を獲得'],    apply(){ const b = Math.floor(2000 * multOf(B.r)); score += b; popup(B.x, B.y - B.r - 24, '+' + yen(b).slice(1), '#ffe08a', 20); } },
  { id:'heat',   icon:'🌈', name:'相場の熱気',   persistent:false,
    desc:['フィーバーゲージ','+50%'],                apply(){ addFever(0.5); } },
];

/* ---------- 市場イベント ---------- */
const EVENTS = [
  { id:'boom',       icon:'💹', name:'好景気',     dur:9, msg:'💹 好景気！配当ラッシュ！' },
  { id:'easing',     icon:'🌀', name:'金融緩和',   dur:8, msg:'🌀 金融緩和！インフレ加速＆資産1.5倍！' },
  { id:'regulation', icon:'🧯', name:'空売り規制', dur:8, msg:'🧯 空売り規制！トゲの動きが鈍る！' },
];

function rankOf(s){
  if (s <   8000) return ['🌱 養分', '#9fb2c8'];
  if (s <  40000) return ['📈 見習い投機家', '#bfe3ff'];
  if (s < 120000) return ['💼 敏腕トレーダー', '#7ee787'];
  if (s < 300000) return ['🔮 相場の魔術師', '#c85cff'];
  if (s < 800000) return ['👑 億り人', '#ffd166'];
  return ['🫧 バブルの神', '#ff7eb6'];
}

/* ---------- 状態 ---------- */
let state = 'title';   // title | play | dying | over
let tReal = 0, elapsed = 0, level = 1;
let score = 0, best = 0, wasRecord = false;
let totalGraze = 0, maxMult = 1, grazeCombo = 0, grazeComboT = 0;
let spawnT = 0, coinT = 0, lastWallT = -99, criticalT = 0, warnBeepT = 0;
let shake = 0, dyingT = 0, overT = 0, bannerTxt = '', bannerT = 0, slowT = 0;
let deathReason = '', ignoreVent = false, paused = false, muted = false;
// perk効果
let grazeBonus = 0, ventEff = 1, coinMul = 1, inflMul = 1, thrustMul = 1, magnetR = 150, barrier = 0;
let perkCounts = {}, invulnT = 0;
// フィーバー
let fever = 0, feverOn = false, feverT = 0, feverCount = 0;
// ボス・イベント・ドラフト
let boss = null, bossCount = 0, bearKills = 0, pendingBoss = false;
let mkt = null, mktT = 16;
let draft = null;
try { best = +localStorage.getItem('bubblenomics_best') || 0; } catch(e){}

const B = { x: 0, y: 0, vx: 0, vy: 0, r: START_R, jetDir: {x:0,y:1} };
let needles = [], bombs = [], coins = [], parts = [], rings = [], popups = [];
const tips = [
  { at: 0.4, txt: '長押し：空気を噴射してカーソルの方へ！' },
  { at: 3.2, txt: '離すと ふくらんで資産が増える…でも当たり判定も💦' },
  { at: 6.5, txt: '噴射の風はトゲを吹き飛ばせる！💨' },
  { at: 10.0, txt: 'トゲすれすれで「リスクプレミアム」→ フィーバーゲージUP！' },
];
let tipIdx = 0;

/* ---------- 背景の塵 ---------- */
const dust = [];
for (let i = 0; i < 60; i++) dust.push({ x: Math.random(), y: Math.random(), r: R(0.6, 2.2), s: R(4, 14), a: R(0.08, 0.3) });

/* ---------- サウンド（WebAudio 生成） ---------- */
let AC = null, master = null, ventGain = null;
function initAudio(){
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.45; master.connect(AC.destination);
    const buf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1500; bp.Q.value = 0.7;
    ventGain = AC.createGain(); ventGain.gain.value = 0;
    src.connect(bp); bp.connect(ventGain); ventGain.connect(master);
    src.start();
  } catch(e){ AC = null; }
}
function beep(freq, dur, type, vol, slide){
  if (!AC || muted) return;
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'sine'; o.frequency.value = freq;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.2, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
    o.connect(g); g.connect(master);
    o.start(); o.stop(AC.currentTime + dur + 0.02);
  } catch(e){}
}
function sndPop(){
  if (!AC || muted) return;
  beep(220, 0.5, 'sawtooth', 0.3, -180);
  beep(90, 0.6, 'square', 0.25, -60);
  try {
    const buf = AC.createBuffer(1, AC.sampleRate * 0.3, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const s = AC.createBufferSource(); s.buffer = buf;
    const g = AC.createGain(); g.gain.value = 0.4;
    s.connect(g); g.connect(master); s.start();
  } catch(e){}
}
function sndCoin(){ beep(880, 0.09, 'sine', 0.22); setTimeout(() => beep(1320, 0.15, 'sine', 0.22), 70); }
function sndGraze(){ beep(1600 + grazeCombo * 120, 0.06, 'triangle', 0.18); }
function sndLevel(){ [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'triangle', 0.2), i * 90)); }
function sndFever(){ [523, 659, 784, 1046, 1318, 1568].forEach((f, i) => setTimeout(() => beep(f, 0.16, 'square', 0.14), i * 70)); }
function sndWarn(){ beep(1200, 0.08, 'square', 0.1); }
function sndShield(){ beep(500, 0.25, 'triangle', 0.3, 300); }
function sndBossHit(){ beep(180, 0.1, 'square', 0.2, -50); }

/* ---------- 入力 ---------- */
const ptr = { x: W / 2, y: H / 2, down: false };
const keys = new Set();
cv.addEventListener('pointerdown', e => {
  ptr.x = e.clientX; ptr.y = e.clientY; ptr.down = true;
  initAudio();
  if (AC && AC.state === 'suspended') AC.resume();
  onPress();
});
window.addEventListener('pointermove', e => { ptr.x = e.clientX; ptr.y = e.clientY; });
window.addEventListener('pointerup', () => { ptr.down = false; ignoreVent = false; });
window.addEventListener('pointercancel', () => { ptr.down = false; ignoreVent = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys.add(e.key);
  if (e.key === 'm' || e.key === 'M') muted = !muted;
  if (e.key === 'p' || e.key === 'P') { if (state === 'play' && !draft) paused = !paused; }
  if (draft && ['1','2','3'].includes(e.key)) { chooseDraft(+e.key - 1); return; }
  if (e.key === ' ' || e.key === 'Enter') { initAudio(); onPress(); }
});
window.addEventListener('keyup', e => keys.delete(e.key));

function keyDir(){
  let x = 0, y = 0;
  if (keys.has('ArrowLeft')  || keys.has('a')) x -= 1;
  if (keys.has('ArrowRight') || keys.has('d')) x += 1;
  if (keys.has('ArrowUp')    || keys.has('w')) y -= 1;
  if (keys.has('ArrowDown')  || keys.has('s')) y += 1;
  return (x || y) ? { x, y } : null;
}
function onPress(){
  if (state === 'play' && draft){
    for (let i = 0; i < draft.rects.length; i++){
      const r = draft.rects[i];
      if (ptr.x >= r.x && ptr.x <= r.x + r.w && ptr.y >= r.y && ptr.y <= r.y + r.h){ chooseDraft(i); break; }
    }
    ignoreVent = true;
    return;
  }
  if (state === 'title') { startGame(); ignoreVent = true; }
  else if (state === 'over' && overT > 0.7) { startGame(); ignoreVent = true; }
}

/* ---------- ゲーム開始 / 被弾 / 死亡 ---------- */
function startGame(){
  state = 'play'; paused = false;
  score = 0; elapsed = 0; level = 1;
  totalGraze = 0; maxMult = 1; grazeCombo = 0; grazeComboT = 0;
  spawnT = 2.5; coinT = 2.0; lastWallT = -99; criticalT = 0; slowT = 0;
  shake = 0; bannerT = 0; tipIdx = 0; wasRecord = false;
  grazeBonus = 0; ventEff = 1; coinMul = 1; inflMul = 1; thrustMul = 1; magnetR = 150; barrier = 0;
  perkCounts = {}; invulnT = 0;
  fever = 0; feverOn = false; feverT = 0; feverCount = 0;
  boss = null; bossCount = 0; bearKills = 0; pendingBoss = false;
  mkt = null; mktT = 16; draft = null;
  B.x = W / 2; B.y = H / 2; B.vx = 0; B.vy = 0; B.r = START_R;
  needles = []; bombs = []; coins = []; parts = []; rings = []; popups = [];
}
function hitHazard(reason){
  if (invulnT > 0) return;
  if (barrier > 0){
    barrier--;
    invulnT = 1.3;
    shake = Math.max(shake, 14);
    sndShield();
    popup(B.x, B.y - B.r - 26, '🛡️ 保険発動！', '#6ee7ff', 22);
    rings.push({ x: B.x, y: B.y, r: B.r, vr: 900, t: 0, life: 0.4, c: '#6ee7ff', w: 5 });
    // 衝撃波：近くのトゲ・爆弾を消し飛ばす
    for (let i = needles.length - 1; i >= 0; i--){
      const n = needles[i];
      if (Math.hypot(n.x - B.x, n.y - B.y) < 210){
        for (let k = 0; k < 4; k++){
          const a = R(0, TAU), sp = R(60, 220);
          parts.push({ x: n.x, y: n.y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, g: 0, drag: 3,
            rot: 0, vr: 0, sz: R(1.5, 3.5), c: '#6ee7ff', t: 0, life: 0.35, shape: 'dot' });
        }
        needles.splice(i, 1);
      }
    }
    for (let i = bombs.length - 1; i >= 0; i--){
      const bm = bombs[i];
      if (Math.hypot(bm.x - B.x, bm.y - B.y) < 210){
        for (let k = 0; k < 8; k++){
          const a = R(0, TAU), sp = R(30, 160);
          parts.push({ x: bm.x, y: bm.y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, g: 0, drag: 2.5,
            rot: 0, vr: 0, sz: R(2, 5), c: '#7ec97e', t: 0, life: 0.5, shape: 'dot' });
        }
        bombs.splice(i, 1);
      }
    }
    return;
  }
  die(reason);
}
function die(reason){
  if (state !== 'play') return;
  state = 'dying'; dyingT = 0; deathReason = reason;
  shake = 24; sndPop();
  if (score > best) { best = score; wasRecord = true; try { localStorage.setItem('bubblenomics_best', String(Math.floor(best))); } catch(e){} }
  const colors = ['#ff7eb6','#ffd166','#4ecdc4','#ff4d6d','#a06cff','#fff'];
  for (let i = 0; i < 130; i++){
    const a = R(0, TAU), sp = R(80, 640);
    parts.push({ x: B.x, y: B.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 120, g: 620, drag: 1.1,
      rot: R(0, TAU), vr: R(-9, 9), sz: R(3, 8), c: colors[RI(0, colors.length - 1)], t: 0, life: R(0.8, 1.8), shape: 'rect' });
  }
  rings.push({ x: B.x, y: B.y, r: B.r, vr: 700, t: 0, life: 0.45, c: '#fff', w: 5 });
  rings.push({ x: B.x, y: B.y, r: B.r * 0.5, vr: 450, t: 0, life: 0.6, c: rgb(GOLD), w: 3 });
}

/* ---------- フィーバー ---------- */
function addFever(x){
  if (feverOn || state !== 'play') return;
  fever = Math.min(1, fever + x);
  if (fever >= 1){
    feverOn = true; feverT = FEVER_DUR; feverCount++;
    bannerTxt = '🌈 バブルフィーバー！！ 資産3倍・配当2倍！';
    bannerT = 3.0;
    sndFever();
    rings.push({ x: B.x, y: B.y, r: B.r, vr: 800, t: 0, life: 0.5, c: '#ffd166', w: 6 });
  }
}

/* ---------- ドラフト（投資戦略） ---------- */
function openDraft(){
  const pool = PERKS.filter(p => !(p.id === 'shield' && barrier >= 3));
  const opts = [];
  while (opts.length < 3 && pool.length){
    const i = RI(0, pool.length - 1);
    opts.push(pool.splice(i, 1)[0]);
  }
  draft = { opts, rects: [] };
  if (ventGain && AC) ventGain.gain.setTargetAtTime(0, AC.currentTime, 0.02);
  beep(660, 0.15, 'triangle', 0.2);
}
function chooseDraft(i){
  if (!draft) return;
  const p = draft.opts[i];
  if (!p) return;
  p.apply();
  if (p.persistent) perkCounts[p.id] = (perkCounts[p.id] || 0) + 1;
  popup(W / 2, H * 0.32, `${p.icon} ${p.name}！`, '#ffe08a', 22);
  beep(780, 0.12, 'triangle', 0.22);
  draft = null;
  ignoreVent = true;
  if (pendingBoss){ pendingBoss = false; startBoss(); }
}

/* ---------- ボス「ベア」 ---------- */
function startBoss(){
  bossCount++;
  const hp = 8 + 5 * (bossCount - 1);
  boss = { x: W / 2, y: -90, t: 0, entering: true, hp, maxHp: hp,
    atkT: 2.2, burstT: 6.5, life: 42, hitFlash: 0 };
  bannerTxt = '🐻 決算警報：ベア襲来！逃げながら噴射の風でトゲを当てろ！';
  bannerT = 3.5;
  beep(120, 0.5, 'sawtooth', 0.25, -40);
  shake = Math.max(shake, 8);
}
function defeatBoss(){
  const bonus = Math.floor(2500 * level + 5000 * bossCount);
  score += bonus;
  bearKills++;
  bannerTxt = `🎉 ベア撃破！ボーナス ${yen(bonus)}！`;
  bannerT = 3.0;
  popup(boss.x, boss.y, '💥', '#fff', 40);
  sndLevel(); sndPop();
  shake = Math.max(shake, 16);
  addFever(0.5);
  const colors = ['#ffd166','#ffe08a','#fff','#ff7eb6'];
  for (let i = 0; i < 80; i++){
    const a = R(0, TAU), sp = R(60, 500);
    parts.push({ x: boss.x, y: boss.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 100, g: 560, drag: 1.1,
      rot: R(0, TAU), vr: R(-8, 8), sz: R(3, 7), c: colors[RI(0, colors.length - 1)], t: 0, life: R(0.7, 1.5), shape: 'rect' });
  }
  rings.push({ x: boss.x, y: boss.y, r: 20, vr: 900, t: 0, life: 0.5, c: '#ffd166', w: 6 });
  // 撃破報酬：コインの雨
  for (let i = 0; i < 8; i++){
    coins.push({ x: clamp(boss.x + R(-140, 140), 40, W - 40), y: clamp(boss.y + R(-100, 100), 60, H - 40), t: 0, life: 11, ph: R(0, TAU) });
  }
  boss = null;
}
function updateBoss(gdt){
  const b = boss;
  b.t += gdt;
  b.hitFlash = Math.max(0, b.hitFlash - gdt * 4);
  if (b.entering){
    b.y += 100 * gdt;
    if (b.y >= H * 0.22) b.entering = false;
    return;
  }
  b.life -= gdt;
  if (b.life <= 0){
    bannerTxt = '🐻 ベアは満腹になって去った…（報酬なし）';
    bannerT = 3.0;
    boss = null;
    return;
  }
  // プレイヤーをじわじわ追う
  const dx = B.x - b.x, dy = B.y - b.y, d = Math.hypot(dx, dy) || 1;
  const sp = 34 + bossCount * 8;
  b.x += dx / d * sp * gdt + Math.cos(b.t * 1.3) * 30 * gdt;
  b.y += dy / d * sp * gdt * 0.6;
  // 3方向の爪攻撃
  b.atkT -= gdt;
  if (b.atkT <= 0){
    b.atkT = Math.max(1.1, 1.8 - bossCount * 0.1);
    const base = Math.atan2(B.y - b.y, B.x - b.x);
    for (const off of [-0.28, 0, 0.28]){
      const n = needleBase('claw', '#ff5c8a');
      n.len = 30;
      n.x = b.x + Math.cos(base + off) * 44;
      n.y = b.y + Math.sin(base + off) * 44;
      const sp2 = Math.min(150 + bossCount * 15, 240);
      n.vx = Math.cos(base + off) * sp2;
      n.vy = Math.sin(base + off) * sp2;
      needles.push(n);
    }
    beep(300, 0.12, 'sawtooth', 0.15, -80);
  }
  // 放射バースト
  b.burstT -= gdt;
  if (b.burstT <= 0){
    b.burstT = 6.5;
    const cnt = 10, ph = R(0, TAU);
    for (let i = 0; i < cnt; i++){
      const a = ph + (i / cnt) * TAU;
      const n = needleBase('claw', '#ff5c8a');
      n.x = b.x + Math.cos(a) * 30;
      n.y = b.y + Math.sin(a) * 30;
      n.vx = Math.cos(a) * 130;
      n.vy = Math.sin(a) * 130;
      needles.push(n);
    }
    beep(160, 0.25, 'square', 0.2, -60);
  }
  // 体当たり
  if (Math.hypot(b.x - B.x, b.y - B.y) < B.r * 0.92 + 40){
    hitHazard('ベアに殴られてバブル崩壊');
  }
}

/* ---------- スポーン ---------- */
function popup(x, y, txt, c, size){
  popups.push({ x, y, txt, c: c || '#fff', size: size || 17, t: 0, life: 1.15 });
}
function spawnEdgePoint(margin){
  const side = RI(0, 3);
  if (side === 0) return { x: R(0, W), y: -margin, side };
  if (side === 1) return { x: W + margin, y: R(0, H), side };
  if (side === 2) return { x: R(0, W), y: H + margin, side };
  return { x: -margin, y: R(0, H), side };
}
function needleBase(type, col){
  return { type, x: 0, y: 0, vx: 0, vy: 0, rot: 0, len: R(24, 30), w: 5.5, hitR: 8,
    col, grazed: false, blown: false, age: 0, t: 0 };
}
function spawnDrift(){
  const n = needleBase('drift', '#ff5f7a');
  const p = spawnEdgePoint(40);
  n.x = p.x; n.y = p.y;
  const tx = R(W * 0.2, W * 0.8), ty = R(H * 0.2, H * 0.8);
  const d = Math.hypot(tx - n.x, ty - n.y) || 1;
  const sp = R(50, 95) * (1 + (level - 1) * 0.05);
  n.vx = (tx - n.x) / d * sp; n.vy = (ty - n.y) / d * sp;
  needles.push(n);
}
function spawnAimed(){
  const n = needleBase('aimed', '#ff2e63');
  const p = spawnEdgePoint(40);
  n.x = p.x; n.y = p.y; n.len = R(28, 34);
  const d = Math.hypot(B.x - n.x, B.y - n.y) || 1;
  const sp = Math.min(130 + level * 10, 280);
  n.vx = (B.x - n.x) / d * sp; n.vy = (B.y - n.y) / d * sp;
  needles.push(n);
}
function spawnSine(){
  const fromLeft = Math.random() < 0.5;
  const n = needleBase('sine', '#c85cff');
  n.x = fromLeft ? -40 : W + 40;
  n.y0 = R(H * 0.15, H * 0.85); n.y = n.y0;
  n.vx = (fromLeft ? 1 : -1) * R(70, 120) * (1 + (level - 1) * 0.05);
  n.A = R(45, 95); n.f = R(2.2, 3.6); n.ph = R(0, TAU);
  needles.push(n);
}
function spawnBomb(){
  if (bombs.length >= 2) return;
  const p = spawnEdgePoint(40);
  const tx = R(W * 0.25, W * 0.75), ty = R(H * 0.25, H * 0.75);
  const d = Math.hypot(tx - p.x, ty - p.y) || 1;
  bombs.push({ x: p.x, y: p.y, tx, ty, vx: (tx - p.x) / d * 85, vy: (ty - p.y) / d * 85,
    fuse: 2.6, arrived: false, t: 0, hitR: 18 });
}
function spawnWall(){
  if (elapsed - lastWallT < 7) return;
  lastWallT = elapsed;
  const fromLeft = Math.random() < 0.5;
  const sp = Math.min(85 + level * 6, 135);
  const gap = Math.max(150, 210 - level * 7);
  const gy = R(gap * 0.6, H - gap * 0.6);
  for (let y = 18; y < H; y += 36){
    if (Math.abs(y - gy) < gap / 2) continue;
    const n = needleBase('wall', '#ff5f7a');
    n.x = fromLeft ? -40 : W + 40; n.y = y + R(-4, 4);
    n.vx = (fromLeft ? 1 : -1) * sp; n.vy = 0;
    needles.push(n);
  }
  popup(fromLeft ? 90 : W - 90, gy, '⚠ 壁！', '#ffd166', 22);
}
function spawnCoin(){
  const cap = (mkt && mkt.id === 'boom') ? 8 : 4;
  if (coins.length >= cap) return;
  coins.push({ x: R(W * 0.15, W * 0.85), y: R(H * 0.18, H * 0.82), t: 0, life: 9, ph: R(0, TAU) });
}
function spawnWave(){
  if (needles.length > 110) return;
  const opts = [['drift', 3]];
  if (level >= 2) opts.push(['aimed', 2.2]);
  if (level >= 3) opts.push(['sine', 2]);
  if (level >= 4 && !boss) opts.push(['bomb', 1.3]);
  if (level >= 6 && !boss) opts.push(['wall', 1.0]);
  let total = 0; for (const o of opts) total += o[1];
  let pick = Math.random() * total, kind = 'drift';
  for (const o of opts){ pick -= o[1]; if (pick <= 0) { kind = o[0]; break; } }
  if (kind === 'drift'){ const c = Math.min(1 + Math.floor(level / 2), 4); for (let i = 0; i < c; i++) spawnDrift(); }
  else if (kind === 'aimed'){ const c = level >= 5 ? 2 : 1; for (let i = 0; i < c; i++) spawnAimed(); }
  else if (kind === 'sine'){ const c = RI(2, 3); for (let i = 0; i < c; i++) spawnSine(); }
  else if (kind === 'bomb') spawnBomb();
  else if (kind === 'wall') spawnWall();
}
function burstBomb(bm){
  const count = Math.min(8 + level, 16);
  const sp = Math.min(110 + level * 8, 190);
  const ph = R(0, TAU);
  for (let i = 0; i < count; i++){
    const a = ph + (i / count) * TAU;
    const n = needleBase('burst', '#ffa62b');
    n.x = bm.x + Math.cos(a) * 14; n.y = bm.y + Math.sin(a) * 14;
    n.vx = Math.cos(a) * sp; n.vy = Math.sin(a) * sp;
    needles.push(n);
  }
  rings.push({ x: bm.x, y: bm.y, r: 6, vr: 520, t: 0, life: 0.35, c: '#ffa62b', w: 4 });
  for (let i = 0; i < 14; i++){
    const a = R(0, TAU), s2 = R(30, 160);
    parts.push({ x: bm.x, y: bm.y, vx: Math.cos(a) * s2, vy: Math.sin(a) * s2, g: 0, drag: 2.5,
      rot: 0, vr: 0, sz: R(2, 5), c: '#7ec97e', t: 0, life: R(0.3, 0.7), shape: 'dot' });
  }
  beep(140, 0.25, 'square', 0.22, -60);
  shake = Math.max(shake, 6);
}

/* ---------- メイン更新 ---------- */
function simulate(gdt){
  elapsed += gdt;
  invulnT = Math.max(0, invulnT - gdt);

  // ---- 四半期（レベル）進行 ----
  const newLevel = 1 + Math.floor(elapsed / QUARTER_SEC);
  if (newLevel > level){
    level = newLevel;
    if (level % 4 === 0){
      bannerTxt = `第${level}四半期`;
      pendingBoss = true;
    } else {
      bannerTxt = `第${level}四半期` + (LEVEL_MSG[level] ? `　${LEVEL_MSG[level]}` : (level > 7 ? '　市場は完全に狂った。' : ''));
    }
    bannerT = 2.8; sndLevel();
    if (level >= 2){ openDraft(); return; }   // ドラフト中はシミュレーション停止
  }

  // ---- チュートリアルtips ----
  if (tipIdx < tips.length && elapsed >= tips[tipIdx].at){
    popup(W / 2, H * 0.22, tips[tipIdx].txt, '#bfe3ff', 18);
    tipIdx++;
  }

  // ---- フィーバー ----
  if (feverOn){
    feverT -= gdt;
    fever = clamp(feverT / FEVER_DUR, 0, 1);
    if (feverT <= 0){ feverOn = false; fever = 0; }
  }

  // ---- 市場イベント ----
  if (mkt){
    mkt.t -= gdt;
    if (mkt.t <= 0){ mkt = null; mktT = R(18, 28); }
  } else if (level >= 3 && !boss){
    mktT -= gdt;
    if (mktT <= 0){
      const e = EVENTS[RI(0, EVENTS.length - 1)];
      mkt = { ...e, t: e.dur };
      bannerTxt = e.msg; bannerT = 2.8;
      beep(440, 0.2, 'triangle', 0.2, 200);
    }
  }

  // ---- 噴射（vent）と膨張 ----
  const kd = keyDir();
  let target = null;
  if (kd) target = { x: B.x + kd.x * 100, y: B.y + kd.y * 100 };
  else if (ptr.down && !ignoreVent) target = { x: ptr.x, y: ptr.y };
  const venting = !!target;

  const inflNow = inflationRate(level) * inflMul * (mkt && mkt.id === 'easing' ? 1.6 : 1);
  B.r += inflNow * gdt;
  if (venting){
    B.r = Math.max(MINR, B.r - VENT_SHRINK * ventEff * gdt);
    const dx = target.x - B.x, dy = target.y - B.y;
    const d = Math.hypot(dx, dy);
    if (d > 2){
      const nx = dx / d, ny = dy / d;
      B.vx += nx * THRUST * thrustMul * gdt; B.vy += ny * THRUST * thrustMul * gdt;
      B.jetDir = { x: -nx, y: -ny };
      for (let i = 0; i < 3; i++){
        const jx = B.x + B.jetDir.x * B.r, jy = B.y + B.jetDir.y * B.r;
        const a = Math.atan2(B.jetDir.y, B.jetDir.x) + R(-0.5, 0.5);
        const sp = R(160, 320);
        parts.push({ x: jx, y: jy, vx: Math.cos(a) * sp + B.vx * 0.4, vy: Math.sin(a) * sp + B.vy * 0.4,
          g: 0, drag: 3.5, rot: 0, vr: 0, sz: R(2, 4.5), c: 'rgba(220,235,255,0.9)', t: 0, life: R(0.2, 0.4), shape: 'dot' });
      }
    }
  } else {
    B.jetDir = { x: 0, y: 1 };
  }
  if (ventGain && AC) ventGain.gain.setTargetAtTime((venting && !muted) ? 0.09 : 0, AC.currentTime, 0.04);

  // ---- 物理 ----
  B.vy -= (B.r - 34) * 1.5 * gdt;
  const drag = Math.exp(-2.1 * gdt);
  B.vx *= drag; B.vy *= drag;
  B.x += B.vx * gdt; B.y += B.vy * gdt;
  if (B.x < B.r)      { B.x = B.r;      B.vx =  Math.abs(B.vx) * 0.55; }
  if (B.x > W - B.r)  { B.x = W - B.r;  B.vx = -Math.abs(B.vx) * 0.55; }
  if (B.y < B.r)      { B.y = B.r;      B.vy =  Math.abs(B.vy) * 0.55; }
  if (B.y > H - B.r)  { B.y = H - B.r;  B.vy = -Math.abs(B.vy) * 0.55; }

  // ---- 過熱（限界サイズ・保険対象外） ----
  if (B.r >= MAXR){
    B.r = MAXR;
    criticalT += gdt;
    shake = Math.max(shake, 4);
    warnBeepT -= gdt;
    if (warnBeepT <= 0){ sndWarn(); warnBeepT = 0.18; }
    if (criticalT > 1.0){
      die('過熱によりバブル崩壊' + (barrier > 0 ? '（※過熱は保険対象外です）' : '（ふくらみすぎ）'));
      return;
    }
  } else {
    criticalT = Math.max(0, criticalT - gdt * 2);
  }

  // ---- 資産（スコア） ----
  const mult = multOf(B.r);
  maxMult = Math.max(maxMult, mult);
  score += SCORE_RATE * mult * (1 + (level - 1) * 0.18)
         * (feverOn ? 3 : 1)
         * (mkt && mkt.id === 'easing' ? 1.5 : 1) * gdt;

  // ---- ボス ----
  if (boss){
    updateBoss(gdt);
    if (state !== 'play') return;
  }

  // ---- スポーン ----
  if (elapsed > 2.5){
    spawnT -= gdt;
    if (spawnT <= 0){
      spawnWave();
      const base = Math.max(0.65, 2.3 - (level - 1) * 0.18) * (boss ? 1.9 : 1);
      spawnT = base * R(0.7, 1.3);
    }
  }
  coinT -= gdt;
  if (coinT <= 0){
    spawnCoin();
    coinT = (mkt && mkt.id === 'boom') ? R(0.5, 1.0) : R(3, 4.5);
  }

  // ---- 針 ----
  grazeComboT -= gdt;
  if (grazeComboT <= 0) grazeCombo = 0;
  const GR = GRAZE + grazeBonus;
  const ndtF = (feverOn ? 0.88 : 1) * (mkt && mkt.id === 'regulation' ? 0.6 : 1);
  const nozX = B.x + B.jetDir.x * B.r, nozY = B.y + B.jetDir.y * B.r;
  for (let i = needles.length - 1; i >= 0; i--){
    const n = needles[i];
    const ndt = gdt * ndtF;
    n.age += ndt; n.t += ndt;
    // 噴射の風：ノズル前方のトゲを吹き飛ばす
    if (venting){
      const wx = n.x - nozX, wy = n.y - nozY, wd = Math.hypot(wx, wy);
      if (wd < WIND_RANGE && wd > 1){
        const dot = (wx / wd) * B.jetDir.x + (wy / wd) * B.jetDir.y;
        if (dot > 0.3){
          if (!n.blown){ n.blown = true; n.vy = n.vy || 0; }
          n.vx += B.jetDir.x * 1500 * gdt;
          n.vy += B.jetDir.y * 1500 * gdt;
          const s = Math.hypot(n.vx, n.vy);
          if (s > 520){ n.vx *= 520 / s; n.vy *= 520 / s; }
        }
      }
    }
    // 吹き飛ばされたトゲ＝味方の誘導弾：ベアへホーミング
    if (n.blown && boss && !boss.entering){
      const bdx = boss.x - n.x, bdy = boss.y - n.y, bd = Math.hypot(bdx, bdy) || 1;
      n.vx += bdx / bd * 1100 * gdt;
      n.vy += bdy / bd * 1100 * gdt;
      const bs = Math.hypot(n.vx, n.vy);
      if (bs > 560){ n.vx *= 560 / bs; n.vy *= 560 / bs; }
    }
    if (n.type === 'sine' && !n.blown){
      n.x += n.vx * ndt;
      n.y = n.y0 + Math.sin(n.t * n.f + n.ph) * n.A;
      n.rot = Math.atan2(Math.cos(n.t * n.f + n.ph) * n.A * n.f, n.vx);
    } else {
      n.x += n.vx * ndt; n.y += (n.vy || 0) * ndt;
      n.rot = Math.atan2(n.vy || 0, n.vx);
    }
    if (n.blown && Math.random() < 0.3){
      parts.push({ x: n.x, y: n.y, vx: R(-30, 30), vy: R(-30, 30), g: 0, drag: 2,
        rot: 0, vr: 0, sz: R(1, 2.5), c: 'rgba(110,231,255,0.8)', t: 0, life: 0.3, shape: 'dot' });
    }
    if (n.age > 0.5 && (n.x < -100 || n.x > W + 100 || n.y < -100 || n.y > H + 100)){
      needles.splice(i, 1); continue;
    }
    // 吹き飛ばされたトゲ vs ボス
    if (boss && !boss.entering && n.blown){
      if (Math.hypot(n.x - boss.x, n.y - boss.y) < 52 + n.hitR){
        boss.hp--; boss.hitFlash = 1;
        sndBossHit();
        popup(boss.x + R(-20, 20), boss.y - 40, '💥', '#fff', 24);
        addFever(0.05);
        for (let k = 0; k < 6; k++){
          const a = R(0, TAU), sp = R(60, 260);
          parts.push({ x: n.x, y: n.y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, g: 0, drag: 3,
            rot: 0, vr: 0, sz: R(2, 4), c: '#6ee7ff', t: 0, life: 0.35, shape: 'dot' });
        }
        needles.splice(i, 1);
        if (boss.hp <= 0) defeatBoss();
        continue;
      }
    }
    if (n.blown) continue;   // 味方化したトゲはプレイヤーに無害（グレイズも無し）
    const d = Math.hypot(n.x - B.x, n.y - B.y);
    if (invulnT <= 0 && d < B.r * 0.92 + n.hitR){
      hitHazard('市場の棘に触れてバブル崩壊');
      if (state !== 'play') return;
      break;   // 保険発動時：衝撃波で配列が変わるためループ打ち切り
    }
    if (!n.grazed && d < B.r + GR + n.hitR){
      n.grazed = true;
      grazeCombo++; grazeComboT = 2.0; totalGraze++;
      slowT = 0.1;
      addFever(0.1 + Math.min(grazeCombo * 0.02, 0.1));
      const bonus = Math.floor(60 * mult * grazeCombo);
      score += bonus;
      popup(n.x, n.y - 14, `+${yen(bonus).slice(1)} スレスレ!${grazeCombo > 1 ? ' ×' + grazeCombo : ''}`, '#ffd166', 15 + Math.min(grazeCombo * 1.5, 8));
      sndGraze();
      shake = Math.max(shake, 2.5);
      for (let k = 0; k < 6; k++){
        const a = R(0, TAU), sp = R(60, 200);
        parts.push({ x: n.x, y: n.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, g: 0, drag: 3,
          rot: 0, vr: 0, sz: R(1.5, 3.5), c: '#ffd166', t: 0, life: 0.35, shape: 'dot' });
      }
    }
  }

  // ---- サボテン爆弾 ----
  for (let i = bombs.length - 1; i >= 0; i--){
    const bm = bombs[i];
    bm.t += gdt; bm.fuse -= gdt;
    if (!bm.arrived){
      bm.x += bm.vx * gdt; bm.y += bm.vy * gdt;
      if (Math.hypot(bm.tx - bm.x, bm.ty - bm.y) < 10) bm.arrived = true;
    }
    if (invulnT <= 0 && Math.hypot(bm.x - B.x, bm.y - B.y) < B.r * 0.92 + bm.hitR){
      hitHazard('サボテンに触れてバブル崩壊');
      if (state !== 'play') return;
      break;
    }
    if (bm.fuse <= 0){ burstBomb(bm); bombs.splice(i, 1); }
  }

  // ---- コイン（配当） ----
  for (let i = coins.length - 1; i >= 0; i--){
    const c = coins[i];
    c.t += gdt;
    const dx = B.x - c.x, dy = B.y - c.y, d = Math.hypot(dx, dy);
    if (d < magnetR && d > 1){ c.x += dx / d * 130 * gdt; c.y += dy / d * 130 * gdt; }
    if (d < B.r + 18){
      const bonus = Math.floor(400 * mult * coinMul * (feverOn ? 2 : 1));
      score += bonus;
      addFever(0.08);
      popup(c.x, c.y - 10, `+${yen(bonus).slice(1)} 配当💰`, '#ffe08a', 18);
      sndCoin();
      for (let k = 0; k < 10; k++){
        const a = R(0, TAU), sp = R(40, 180);
        parts.push({ x: c.x, y: c.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, g: 240, drag: 1.5,
          rot: R(0, TAU), vr: R(-6, 6), sz: R(2, 4), c: '#ffd166', t: 0, life: 0.6, shape: 'rect' });
      }
      coins.splice(i, 1); continue;
    }
    if (c.t > c.life){ coins.splice(i, 1); }
  }
}

function updateFx(gdt){
  for (let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.t += gdt;
    if (p.t > p.life){ parts.splice(i, 1); continue; }
    p.vy += (p.g || 0) * gdt;
    const dr = Math.exp(-(p.drag || 0) * gdt);
    p.vx *= dr; p.vy *= dr;
    p.x += p.vx * gdt; p.y += p.vy * gdt;
    p.rot += (p.vr || 0) * gdt;
  }
  for (let i = rings.length - 1; i >= 0; i--){
    const r0 = rings[i];
    r0.t += gdt;
    if (r0.t > r0.life){ rings.splice(i, 1); continue; }
    r0.r += r0.vr * gdt;
  }
  for (let i = popups.length - 1; i >= 0; i--){
    const p = popups[i];
    p.t += gdt;
    if (p.t > p.life) popups.splice(i, 1);
  }
}

/* ---------- 描画 ---------- */
function drawBG(){
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (feverOn){
    const hue = (tReal * 40) % 360;
    g.addColorStop(0, rgb(hsl2rgb(hue, 0.5, 0.12)));
    g.addColorStop(0.55, rgb(hsl2rgb((hue + 40) % 360, 0.5, 0.18)));
    g.addColorStop(1, rgb(hsl2rgb((hue + 80) % 360, 0.5, 0.22)));
  } else {
    g.addColorStop(0, '#150d33');
    g.addColorStop(0.55, '#31184f');
    g.addColorStop(1, '#5b2154');
  }
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  for (const d of dust){
    const y = ((d.y * H - tReal * d.s) % H + H) % H;
    ctx.globalAlpha = d.a;
    ctx.fillStyle = '#ffd9ec';
    ctx.beginPath(); ctx.arc(d.x * W, y, d.r, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawNeedle(n){
  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.rotate(n.rot);
  ctx.fillStyle = n.blown ? '#6ee7ff' : n.col;
  ctx.beginPath();
  ctx.moveTo(n.len * 0.6, 0);
  ctx.lineTo(-n.len * 0.4, n.w);
  ctx.lineTo(-n.len * 0.6, 0);
  ctx.lineTo(-n.len * 0.4, -n.w);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(n.len * 0.42, 0, 1.9, 0, TAU); ctx.fill();
  ctx.restore();
}
function drawBomb(bm){
  ctx.save();
  ctx.translate(bm.x, bm.y);
  ctx.rotate(Math.sin(bm.t * 6) * 0.15);
  if (bm.fuse < 1.4){
    const p = clamp(bm.fuse / 1.4, 0, 1);
    ctx.strokeStyle = `rgba(255,166,43,${0.5 + Math.sin(tReal * 20) * 0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 22 + p * 34, 0, TAU); ctx.stroke();
  }
  ctx.font = `34px ${EMOJI}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🌵', 0, 0);

function drawBalloon(){
  const t = clamp((B.r - MINR) / (MAXR - MINR), 0, 1);
  let col = t < 0.55 ? lerpC(PINK, GOLD, t / 0.55) : lerpC(GOLD, RED, (t - 0.55) / 0.45);
  if (feverOn) col = hsl2rgb((tReal * 140) % 360, 0.75, 0.66);
  const warning = B.r > MAXR * 0.85;
  const sp = Math.min(Math.hypot(B.vx, B.vy) / 700, 0.22);
  const ang = Math.atan2(B.vy, B.vx);
  const breathe = 1 + Math.sin(tReal * 8) * 0.015 + (warning ? Math.sin(tReal * 34) * 0.03 : 0);

  ctx.save();
  ctx.translate(B.x, B.y);
  if (invulnT > 0) ctx.globalAlpha = 0.55 + Math.sin(tReal * 30) * 0.3;

  // グレイズ判定リング
  ctx.save();
  ctx.strokeStyle = grazeCombo > 0 ? `rgba(255,209,102,${0.3 + Math.sin(tReal * 12) * 0.15})` : 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 8]);
  ctx.beginPath(); ctx.arc(0, 0, B.r + GRAZE + grazeBonus, 0, TAU); ctx.stroke();
  ctx.restore();

  // 保険（バリア）の盾
  for (let i = 0; i < barrier; i++){
    const a = tReal * 1.5 + i * TAU / barrier;
    const bx = Math.cos(a) * (B.r + 26), by = Math.sin(a) * (B.r + 26);
    ctx.font = `16px ${EMOJI}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🛡️', bx, by);
  }

  ctx.rotate(ang); ctx.scale((1 + sp) * breathe, (1 - sp) * breathe); ctx.rotate(-ang);

  const g = ctx.createRadialGradient(-B.r * 0.35, -B.r * 0.4, B.r * 0.1, 0, 0, B.r * 1.05);
  g.addColorStop(0, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.25, rgb(lerpC(col, [255,255,255], 0.35)));
  g.addColorStop(0.8, rgb(col));
  g.addColorStop(1, rgb(lerpC(col, [40,10,50], 0.35)));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, B.r, 0, TAU); ctx.fill();

  const jd = B.jetDir;
  const kx = jd.x * B.r, ky = jd.y * B.r;
  const ka = Math.atan2(jd.y, jd.x);
  ctx.save();
  ctx.translate(kx, ky); ctx.rotate(ka);
  ctx.fillStyle = rgb(lerpC(col, [40,10,50], 0.3));
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(9, -6); ctx.lineTo(9, 6); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(kx, ky);
  const sl = 34 + B.r * 0.4;
  const wig = Math.sin(tReal * 6) * 10;
  ctx.quadraticCurveTo(kx + jd.x * sl * 0.5 + wig, ky + jd.y * sl * 0.5,
                       kx + jd.x * sl - wig * 0.6, ky + jd.y * sl);
  ctx.stroke();

  const lookD = Math.hypot(B.vx, B.vy);
  const lx = lookD > 10 ? B.vx / lookD : 0, ly = lookD > 10 ? B.vy / lookD : 0;
  const er = Math.max(B.r * 0.09, 2.6);
  ctx.fillStyle = '#2b1b3a';
  for (const s of [-1, 1]){
    const ex = s * B.r * 0.3, ey = -B.r * 0.12;
    if (warning){
      ctx.save();
      ctx.strokeStyle = '#2b1b3a'; ctx.lineWidth = Math.max(B.r * 0.045, 2); ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ex - er * s, ey - er); ctx.lineTo(ex + er * s, ey);
      ctx.moveTo(ex - er * s, ey + er); ctx.lineTo(ex + er * s, ey);
      ctx.stroke();
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(ex + lx * er * 0.7, ey + ly * er * 0.7, er, 0, TAU); ctx.fill();
    }
  }
  ctx.strokeStyle = '#2b1b3a'; ctx.lineWidth = Math.max(B.r * 0.04, 1.8); ctx.lineCap = 'round';
  ctx.beginPath();
  if (warning){
    const mw = B.r * 0.16;
    ctx.moveTo(-mw, B.r * 0.22);
    for (let i = 1; i <= 4; i++) ctx.lineTo(-mw + (i / 4) * mw * 2, B.r * 0.22 + (i % 2 ? -1 : 1) * B.r * 0.05);
  } else {
    ctx.arc(0, B.r * 0.12, B.r * 0.16, 0.25 * Math.PI, 0.75 * Math.PI);
  }
  ctx.stroke();
  if (t > 0.45){
    ctx.fillStyle = 'rgba(255,90,120,0.4)';
    ctx.beginPath(); ctx.arc(-B.r * 0.48, B.r * 0.08, B.r * 0.12, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc( B.r * 0.48, B.r * 0.08, B.r * 0.12, 0, TAU); ctx.fill();
  }
  if (warning){
    ctx.fillStyle = 'rgba(140,200,255,0.9)';
    const sy = -B.r * 0.55 + Math.sin(tReal * 10) * 2;
    ctx.beginPath();
    ctx.moveTo(B.r * 0.55, sy - 7);
    ctx.quadraticCurveTo(B.r * 0.55 + 6, sy + 3, B.r * 0.55, sy + 6);
    ctx.quadraticCurveTo(B.r * 0.55 - 6, sy + 3, B.r * 0.55, sy - 7);
    ctx.fill();
  }
  ctx.restore();
}
function drawParts(){

    if (p.shape === 'rect'){

      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.sz / 2, -p.sz / 3, p.sz, p.sz * 0.66);
      ctx.restore();
    } else {
      ctx.fillStyle = p.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * a, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

    const a = clamp(1 - r0.t / r0.life, 0, 1);

}

function frame(now){
  requestAnimationFrame(frame);
  let rdt = Math.min((now - last) / 1000, 0.05);
  last = now;
  tReal += rdt;

  let gdt = rdt;
  if (state === 'play'){
    if (!paused && !draft){
      if (slowT > 0){ slowT -= rdt; gdt *= 0.5; }   // グレイズの微スロー
      simulate(gdt);
    }
  } else if (state === 'dying'){
    dyingT += rdt;
    gdt = rdt * (dyingT < 0.12 ? 0 : 0.22);
    for (const n of needles){
      n.t += gdt;
      if (n.type === 'sine' && !n.blown){ n.x += n.vx * gdt; n.y = n.y0 + Math.sin(n.t * n.f + n.ph) * n.A; }
      else { n.x += n.vx * gdt; n.y += (n.vy || 0) * gdt; }
    }
    if (dyingT > 1.5){ state = 'over'; overT = 0; }
  } else if (state === 'over'){
    overT += rdt;
  }
  if (ventGain && AC && (state !== 'play' || paused || draft)){
    ventGain.gain.setTargetAtTime(0, AC.currentTime, 0.03);
  }
  updateFx(state === 'dying' ? gdt : ((state === 'play' && (paused || draft)) ? 0 : rdt));
  shake = Math.max(0, shake - shake * 7 * rdt - 2 * rdt);
  if (bannerT > 0) bannerT -= rdt;

  /* ---- 描画 ---- */
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  const sx = R(-shake, shake), sy = R(-shake, shake);
  ctx.translate(sx, sy);

  drawBG();
  for (const c of coins) drawCoin(c);
  for (const bm of bombs) drawBomb(bm);
  for (const n of needles) drawNeedle(n);
  if (boss) drawBoss();
  if (state === 'play') drawBalloon();
  drawParts();
  drawPopups();

  if (state === 'play' || state === 'dying') drawHUD();
  if (state === 'title') drawTitle();
  if (state === 'over') drawOver();
  if (draft && state === 'play') drawDraft();
  if (paused && state === 'play' && !draft){
    ctx.fillStyle = 'rgba(15,8,30,0.55)';
    ctx.fillRect(-20, -20, W + 40, H + 40);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = F(30); ctx.fillStyle = '#fff';
    ctx.fillText('⏸ 一時停止中（Pで再開）', W / 2, H / 2);
  }

  const v = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.45, W / 2, H / 2, Math.max(W, H) * 0.75);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(10,4,24,0.45)');
  ctx.fillStyle = v;
  ctx.fillRect(-20, -20, W + 40, H + 40);
}
requestAnimationFrame(frame);

/* ---------- デバッグ用フック（検証で使用・プレイに影響なし） ---------- */
window.GAME = {
  get state(){ return state; },
  get score(){ return Math.floor(score); },
  get level(){ return level; },
  get needleCount(){ return needles.length; },
  get draftOpen(){ return !!draft; },
  get bossHp(){ return boss ? boss.hp : null; },
  get fever(){ return fever; },
  get barrier(){ return barrier; },
  start(){ if (state !== 'play') startGame(); },
  addTime(s){ elapsed += s; },
  choose(i){ chooseDraft(i); },
  forceBoss(){ if (state === 'play' && !boss) startBoss(); },
  forceEvent(i){ const e = EVENTS[i]; if (e && state === 'play'){ mkt = { ...e, t: e.dur }; } },
  addFever(x){ addFever(x); },
  pop(){ die('デバッグ'); },
  god(n){ barrier = n; invulnT = 2; },
  bossDamage(n){ if (boss && !boss.entering){ boss.hp -= n; boss.hitFlash = 1; if (boss.hp <= 0) defeatBoss(); } },
  get blownCount(){ return needles.filter(n => n.blown).length; },
  debug(){
    return { r: +B.r.toFixed(1), x: +B.x.toFixed(0), y: +B.y.toFixed(0), elapsed: +elapsed.toFixed(1),
      ptrDown: ptr.down, ignoreVent, paused, level, invulnT: +invulnT.toFixed(2),
      boss: boss ? { y: +boss.y.toFixed(0), entering: boss.entering, life: +boss.life.toFixed(1), hp: boss.hp } : null };
  },
};
</script>
</body>
