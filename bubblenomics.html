<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎈 BUBBLENOMICS — バブルは、はじける直前がいちばん儲かる</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#150d33;}
  canvas{display:block;touch-action:none;cursor:crosshair;}
  *{-webkit-tap-highlight-color:transparent;user-select:none;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
'use strict';
/* =========================================================
   BUBBLENOMICS 〜バブルは、はじける直前がいちばん儲かる〜
   弾幕回避 × バブル経済チキンレース / 1ファイル・外部アセットなし
   ========================================================= */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W * DPR); cv.height = Math.floor(H * DPR);
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
}
window.addEventListener('resize', resize);
resize();

/* ---------- ユーティリティ ---------- */
const TAU = Math.PI * 2;
const R  = (a, b) => a + Math.random() * (b - a);
const RI = (a, b) => Math.floor(R(a, b + 1));
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
function lerpC(c1, c2, t){ return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)]; }
function rgb(c, a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a===undefined?1:a})`; }
const FONT = '"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
const EMOJI = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';
const F = (s, w) => `${w||'bold'} ${s}px ${FONT}`;
const yen = n => '¥' + Math.floor(n).toLocaleString('ja-JP');

/* ---------- ゲーム定数（バランス調整の中枢） ---------- */
const MINR = 16, MAXR = 95;        // 風船の半径レンジ
const START_R = 30;
const GRAZE = 26;                  // グレイズ判定の余白
const VENT_SHRINK = 34;            // 噴射中の収縮速度 px/s
const THRUST = 1050;               // 噴射加速度
const SCORE_RATE = 60;             // 基礎資産レート /s
const QUARTER_SEC = 18;            // 1四半期の長さ
const inflationRate = lv => Math.min(7 + (lv - 1) * 1.1, 16);
const multOf = r => (r / MINR) * (r / MINR);   // 資産倍率 = サイズ^2

const PINK = [255,126,182], GOLD = [255,209,102], RED = [255,77,109];
const LEVEL_MSG = {
  2: '狙撃針が資産を狙ってくる…！',
  3: '蛇行するトゲ市場、出現',
  4: '🌵 空売り筋（サボテン爆弾）、参入。',
  5: 'インフレ加速！ふくらみが止まらない！',
  6: 'トゲの壁が迫る…隙間を抜けろ！',
  7: 'ここから先は、カオス相場。',
};

/* ---------- 状態 ---------- */
let state = 'title';   // title | play | dying | over
let tReal = 0, elapsed = 0, level = 1;
let score = 0, best = 0, wasRecord = false;
let totalGraze = 0, maxMult = 1, grazeCombo = 0, grazeComboT = 0;
let spawnT = 0, coinT = 0, lastWallT = -99, criticalT = 0, warnBeepT = 0;
let shake = 0, dyingT = 0, overT = 0, bannerTxt = '', bannerT = 0;
let deathReason = '', ignoreVent = false, paused = false, muted = false;
try { best = +localStorage.getItem('bubblenomics_best') || 0; } catch(e){}

const B = { x: 0, y: 0, vx: 0, vy: 0, r: START_R, jetDir: {x:0,y:1} };
let needles = [], bombs = [], coins = [], parts = [], rings = [], popups = [];
const tips = [
  { at: 0.4, txt: '長押し：空気を噴射してカーソルの方へ！' },
  { at: 3.2, txt: '離すと ふくらんで資産が増える…でも当たり判定も💦' },
  { at: 6.5, txt: 'トゲすれすれで「リスクプレミアム」ボーナス！' },
];
let tipIdx = 0;

/* ---------- 背景の塵 ---------- */
const dust = [];
for (let i = 0; i < 60; i++) dust.push({ x: Math.random(), y: Math.random(), r: R(0.6, 2.2), s: R(4, 14), a: R(0.08, 0.3) });

/* ---------- サウンド（WebAudio 生成・外部ファイルなし） ---------- */
let AC = null, master = null, ventGain = null;
function initAudio(){
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.45; master.connect(AC.destination);
    const buf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1500; bp.Q.value = 0.7;
    ventGain = AC.createGain(); ventGain.gain.value = 0;
    src.connect(bp); bp.connect(ventGain); ventGain.connect(master);
    src.start();
  } catch(e){ AC = null; }
}
function beep(freq, dur, type, vol, slide){
  if (!AC || muted) return;
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'sine'; o.frequency.value = freq;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.2, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
    o.connect(g); g.connect(master);
    o.start(); o.stop(AC.currentTime + dur + 0.02);
  } catch(e){}
}
function sndPop(){
  if (!AC || muted) return;
  beep(220, 0.5, 'sawtooth', 0.3, -180);
  beep(90, 0.6, 'square', 0.25, -60);
  try {
    const buf = AC.createBuffer(1, AC.sampleRate * 0.3, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const s = AC.createBufferSource(); s.buffer = buf;
    const g = AC.createGain(); g.gain.value = 0.4;
    s.connect(g); g.connect(master); s.start();
  } catch(e){}
}
function sndCoin(){ beep(880, 0.09, 'sine', 0.22); setTimeout(() => beep(1320, 0.15, 'sine', 0.22), 70); }
function sndGraze(){ beep(1600 + grazeCombo * 120, 0.06, 'triangle', 0.18); }
function sndLevel(){ [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'triangle', 0.2), i * 90)); }
function sndWarn(){ beep(1200, 0.08, 'square', 0.1); }

/* ---------- 入力 ---------- */
const ptr = { x: W / 2, y: H / 2, down: false };
const keys = new Set();
cv.addEventListener('pointerdown', e => {
  ptr.x = e.clientX; ptr.y = e.clientY; ptr.down = true;
  initAudio();
  if (AC && AC.state === 'suspended') AC.resume();
  onPress();
});
window.addEventListener('pointermove', e => { ptr.x = e.clientX; ptr.y = e.clientY; });
window.addEventListener('pointerup', () => { ptr.down = false; ignoreVent = false; });
window.addEventListener('pointercancel', () => { ptr.down = false; ignoreVent = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys.add(e.key);
  if (e.key === 'm' || e.key === 'M') muted = !muted;
  if (e.key === 'p' || e.key === 'P') { if (state === 'play') paused = !paused; }
  if (e.key === ' ' || e.key === 'Enter') { initAudio(); onPress(); }
});
window.addEventListener('keyup', e => keys.delete(e.key));

function keyDir(){
  let x = 0, y = 0;
  if (keys.has('ArrowLeft')  || keys.has('a')) x -= 1;
  if (keys.has('ArrowRight') || keys.has('d')) x += 1;
  if (keys.has('ArrowUp')    || keys.has('w')) y -= 1;
  if (keys.has('ArrowDown')  || keys.has('s')) y += 1;
  return (x || y) ? { x, y } : null;
}
function onPress(){
  if (state === 'title') { startGame(); ignoreVent = true; }
  else if (state === 'over' && overT > 0.7) { startGame(); ignoreVent = true; }
}

/* ---------- ゲーム開始 / 死亡 ---------- */
function startGame(){
  state = 'play'; paused = false;
  score = 0; elapsed = 0; level = 1;
  totalGraze = 0; maxMult = 1; grazeCombo = 0; grazeComboT = 0;
  spawnT = 2.5; coinT = 2.0; lastWallT = -99; criticalT = 0;
  shake = 0; bannerT = 0; tipIdx = 0; wasRecord = false;
  B.x = W / 2; B.y = H / 2; B.vx = 0; B.vy = 0; B.r = START_R;
  needles = []; bombs = []; coins = []; parts = []; rings = []; popups = [];
}
function die(reason){
  if (state !== 'play') return;
  state = 'dying'; dyingT = 0; deathReason = reason;
  shake = 24; sndPop();
  if (score > best) { best = score; wasRecord = true; try { localStorage.setItem('bubblenomics_best', String(Math.floor(best))); } catch(e){} }
  // 破裂：紙吹雪＋リング
  const colors = ['#ff7eb6','#ffd166','#4ecdc4','#ff4d6d','#a06cff','#fff'];
  for (let i = 0; i < 130; i++){
    const a = R(0, TAU), sp = R(80, 640);
    parts.push({ x: B.x, y: B.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 120, g: 620, drag: 1.1,
      rot: R(0, TAU), vr: R(-9, 9), sz: R(3, 8), c: colors[RI(0, colors.length - 1)], t: 0, life: R(0.8, 1.8), shape: 'rect' });
  }
  rings.push({ x: B.x, y: B.y, r: B.r, vr: 700, t: 0, life: 0.45, c: '#fff', w: 5 });
  rings.push({ x: B.x, y: B.y, r: B.r * 0.5, vr: 450, t: 0, life: 0.6, c: rgb(GOLD), w: 3 });
}

/* ---------- スポーン ---------- */
function popup(x, y, txt, c, size){
  popups.push({ x, y, txt, c: c || '#fff', size: size || 17, t: 0, life: 1.15 });
}
function spawnEdgePoint(margin){
  const side = RI(0, 3); // 0上 1右 2下 3左
  if (side === 0) return { x: R(0, W), y: -margin, side };
  if (side === 1) return { x: W + margin, y: R(0, H), side };
  if (side === 2) return { x: R(0, W), y: H + margin, side };
  return { x: -margin, y: R(0, H), side };
}
function needleBase(type, col){
  return { type, x: 0, y: 0, vx: 0, vy: 0, rot: 0, len: R(24, 30), w: 5.5, hitR: 8,
    col, grazed: false, age: 0, t: 0 };
}
function spawnDrift(){
  const n = needleBase('drift', '#ff5f7a');
  const p = spawnEdgePoint(40);
  n.x = p.x; n.y = p.y;
  const tx = R(W * 0.2, W * 0.8), ty = R(H * 0.2, H * 0.8);
  const d = Math.hypot(tx - n.x, ty - n.y) || 1;
  const sp = R(50, 95) * (1 + (level - 1) * 0.05);
  n.vx = (tx - n.x) / d * sp; n.vy = (ty - n.y) / d * sp;
  needles.push(n);
}
function spawnAimed(){
  const n = needleBase('aimed', '#ff2e63');
  const p = spawnEdgePoint(40);
  n.x = p.x; n.y = p.y; n.len = R(28, 34);
  const d = Math.hypot(B.x - n.x, B.y - n.y) || 1;
  const sp = Math.min(130 + level * 10, 260);
  n.vx = (B.x - n.x) / d * sp; n.vy = (B.y - n.y) / d * sp;
  needles.push(n);
}
function spawnSine(){
  const fromLeft = Math.random() < 0.5;
  const n = needleBase('sine', '#c85cff');
  n.x = fromLeft ? -40 : W + 40;
  n.y0 = R(H * 0.15, H * 0.85); n.y = n.y0;
  n.vx = (fromLeft ? 1 : -1) * R(70, 120) * (1 + (level - 1) * 0.05);
  n.A = R(45, 95); n.f = R(2.2, 3.6); n.ph = R(0, TAU);
  needles.push(n);
}
function spawnBomb(){
  if (bombs.length >= 2) return;
  const p = spawnEdgePoint(40);
  const tx = R(W * 0.25, W * 0.75), ty = R(H * 0.25, H * 0.75);
  const d = Math.hypot(tx - p.x, ty - p.y) || 1;
  bombs.push({ x: p.x, y: p.y, tx, ty, vx: (tx - p.x) / d * 85, vy: (ty - p.y) / d * 85,
    fuse: 2.6, arrived: false, t: 0, hitR: 18 });
}
function spawnWall(){
  if (elapsed - lastWallT < 7) return;
  lastWallT = elapsed;
  const fromLeft = Math.random() < 0.5;
  const sp = Math.min(85 + level * 6, 135);
  const gap = Math.max(150, 210 - level * 7);
  const gy = R(gap * 0.6, H - gap * 0.6);
  for (let y = 18; y < H; y += 36){
    if (Math.abs(y - gy) < gap / 2) continue;
    const n = needleBase('wall', '#ff5f7a');
    n.x = fromLeft ? -40 : W + 40; n.y = y + R(-4, 4);
    n.vx = (fromLeft ? 1 : -1) * sp; n.vy = 0;
    needles.push(n);
  }
  popup(fromLeft ? 90 : W - 90, gy, '⚠ 壁！', '#ffd166', 22);
}
function spawnCoin(){
  if (coins.length >= 4) return;
  coins.push({ x: R(W * 0.15, W * 0.85), y: R(H * 0.18, H * 0.82), t: 0, life: 9, ph: R(0, TAU) });
}
function spawnWave(){
  if (needles.length > 110) return;
  const opts = [['drift', 3]];
  if (level >= 2) opts.push(['aimed', 2.2]);
  if (level >= 3) opts.push(['sine', 2]);
  if (level >= 4) opts.push(['bomb', 1.3]);
  if (level >= 6) opts.push(['wall', 1.0]);
  let total = 0; for (const o of opts) total += o[1];
  let pick = Math.random() * total, kind = 'drift';
  for (const o of opts){ pick -= o[1]; if (pick <= 0) { kind = o[0]; break; } }
  if (kind === 'drift'){ const c = Math.min(1 + Math.floor(level / 2), 4); for (let i = 0; i < c; i++) spawnDrift(); }
  else if (kind === 'aimed'){ const c = level >= 5 ? 2 : 1; for (let i = 0; i < c; i++) spawnAimed(); }
  else if (kind === 'sine'){ const c = RI(2, 3); for (let i = 0; i < c; i++) spawnSine(); }
  else if (kind === 'bomb') spawnBomb();
  else if (kind === 'wall') spawnWall();
}
function burstBomb(bm){
  const count = Math.min(8 + level, 16);
  const sp = Math.min(110 + level * 8, 190);
  const ph = R(0, TAU);
  for (let i = 0; i < count; i++){
    const a = ph + (i / count) * TAU;
    const n = needleBase('burst', '#ffa62b');
    n.x = bm.x + Math.cos(a) * 14; n.y = bm.y + Math.sin(a) * 14;
    n.vx = Math.cos(a) * sp; n.vy = Math.sin(a) * sp;
    needles.push(n);
  }
  rings.push({ x: bm.x, y: bm.y, r: 6, vr: 520, t: 0, life: 0.35, c: '#ffa62b', w: 4 });
  for (let i = 0; i < 14; i++){
    const a = R(0, TAU), s2 = R(30, 160);
    parts.push({ x: bm.x, y: bm.y, vx: Math.cos(a) * s2, vy: Math.sin(a) * s2, g: 0, drag: 2.5,
      rot: 0, vr: 0, sz: R(2, 5), c: '#7ec97e', t: 0, life: R(0.3, 0.7), shape: 'dot' });
  }
  beep(140, 0.25, 'square', 0.22, -60);
  shake = Math.max(shake, 6);
}

/* ---------- メイン更新 ---------- */
function simulate(gdt){
  elapsed += gdt;

  // ---- 四半期（レベル）進行 ----
  const newLevel = 1 + Math.floor(elapsed / QUARTER_SEC);
  if (newLevel > level){
    level = newLevel;
    bannerTxt = `第${level}四半期` + (LEVEL_MSG[level] ? `　${LEVEL_MSG[level]}` : (level > 7 ? '　市場は完全に狂った。' : ''));
    bannerT = 2.8; sndLevel();
  }

  // ---- チュートリアルtips ----
  if (tipIdx < tips.length && elapsed >= tips[tipIdx].at){
    popup(W / 2, H * 0.22, tips[tipIdx].txt, '#bfe3ff', 18);
    tipIdx++;
  }

  // ---- 噴射（vent）と膨張 ----
  const kd = keyDir();
  let target = null;
  if (kd) target = { x: B.x + kd.x * 100, y: B.y + kd.y * 100 };
  else if (ptr.down && !ignoreVent) target = { x: ptr.x, y: ptr.y };
  const venting = !!target;

  B.r += inflationRate(level) * gdt;                     // インフレは止まらない
  if (venting){
    B.r = Math.max(MINR, B.r - VENT_SHRINK * gdt);
    const dx = target.x - B.x, dy = target.y - B.y;
    const d = Math.hypot(dx, dy);
    if (d > 2){
      const nx = dx / d, ny = dy / d;
      B.vx += nx * THRUST * gdt; B.vy += ny * THRUST * gdt;
      B.jetDir = { x: -nx, y: -ny };
      // ジェット粒子
      for (let i = 0; i < 3; i++){
        const jx = B.x + B.jetDir.x * B.r, jy = B.y + B.jetDir.y * B.r;
        const a = Math.atan2(B.jetDir.y, B.jetDir.x) + R(-0.5, 0.5);
        const sp = R(160, 320);
        parts.push({ x: jx, y: jy, vx: Math.cos(a) * sp + B.vx * 0.4, vy: Math.sin(a) * sp + B.vy * 0.4,
          g: 0, drag: 3.5, rot: 0, vr: 0, sz: R(2, 4.5), c: 'rgba(220,235,255,0.9)', t: 0, life: R(0.2, 0.4), shape: 'dot' });
      }
    }
  } else {
    B.jetDir = { x: 0, y: 1 };
  }
  if (ventGain) ventGain.gain.setTargetAtTime((venting && !muted && state === 'play') ? 0.09 : 0, AC.currentTime, 0.04);

  // ---- 物理 ----
  B.vy -= (B.r - 34) * 1.5 * gdt;                        // 大きいほど浮く
  const drag = Math.exp(-2.1 * gdt);
  B.vx *= drag; B.vy *= drag;
  B.x += B.vx * gdt; B.y += B.vy * gdt;
  if (B.x < B.r)      { B.x = B.r;      B.vx =  Math.abs(B.vx) * 0.55; }
  if (B.x > W - B.r)  { B.x = W - B.r;  B.vx = -Math.abs(B.vx) * 0.55; }
  if (B.y < B.r)      { B.y = B.r;      B.vy =  Math.abs(B.vy) * 0.55; }
  if (B.y > H - B.r)  { B.y = H - B.r;  B.vy = -Math.abs(B.vy) * 0.55; }

  // ---- 過熱（限界サイズ） ----
  if (B.r >= MAXR){
    B.r = MAXR;
    criticalT += gdt;
    shake = Math.max(shake, 4);
    warnBeepT -= gdt;
    if (warnBeepT <= 0){ sndWarn(); warnBeepT = 0.18; }
    if (criticalT > 1.0){ die('過熱によりバブル崩壊（ふくらみすぎ）'); return; }
  } else {
    criticalT = Math.max(0, criticalT - gdt * 2);
  }

  // ---- 資産（スコア） ----
  const mult = multOf(B.r);
  maxMult = Math.max(maxMult, mult);
  score += SCORE_RATE * mult * (1 + (level - 1) * 0.18) * gdt;

  // ---- スポーン ----
  if (elapsed > 2.5){
    spawnT -= gdt;
    if (spawnT <= 0){
      spawnWave();
      const base = Math.max(0.65, 2.3 - (level - 1) * 0.18);
      spawnT = base * R(0.7, 1.3);
    }
  }
  coinT -= gdt;
  if (coinT <= 0){ spawnCoin(); coinT = R(3, 4.5); }

  // ---- 針 ----
  grazeComboT -= gdt;
  if (grazeComboT <= 0) grazeCombo = 0;
  for (let i = needles.length - 1; i >= 0; i--){
    const n = needles[i];
    n.age += gdt; n.t += gdt;
    if (n.type === 'sine'){
      n.x += n.vx * gdt;
      n.y = n.y0 + Math.sin(n.t * n.f + n.ph) * n.A;
      n.rot = Math.atan2(Math.cos(n.t * n.f + n.ph) * n.A * n.f, n.vx);
    } else {
      n.x += n.vx * gdt; n.y += n.vy * gdt;
      n.rot = Math.atan2(n.vy, n.vx);
    }
    // 画面外カリング
    if (n.age > 0.5 && (n.x < -100 || n.x > W + 100 || n.y < -100 || n.y > H + 100)){
      needles.splice(i, 1); continue;
    }
    const d = Math.hypot(n.x - B.x, n.y - B.y);
    // 命中
    if (d < B.r * 0.92 + n.hitR){ die('市場の棘に触れてバブル崩壊'); return; }
    // グレイズ（リスクプレミアム）
    if (!n.grazed && d < B.r + GRAZE + n.hitR){
      n.grazed = true;
      grazeCombo++; grazeComboT = 2.0; totalGraze++;
      const bonus = Math.floor(60 * mult * grazeCombo);
      score += bonus;
      popup(n.x, n.y - 14, `+${yen(bonus).slice(1)} スレスレ!${grazeCombo > 1 ? ' ×' + grazeCombo : ''}`, '#ffd166', 15 + Math.min(grazeCombo * 1.5, 8));
      sndGraze();
      shake = Math.max(shake, 2.5);
      for (let k = 0; k < 6; k++){
        const a = R(0, TAU), sp = R(60, 200);
        parts.push({ x: n.x, y: n.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, g: 0, drag: 3,
          rot: 0, vr: 0, sz: R(1.5, 3.5), c: '#ffd166', t: 0, life: 0.35, shape: 'dot' });
      }
    }
  }

  // ---- サボテン爆弾 ----
  for (let i = bombs.length - 1; i >= 0; i--){
    const bm = bombs[i];
    bm.t += gdt; bm.fuse -= gdt;
    if (!bm.arrived){
      bm.x += bm.vx * gdt; bm.y += bm.vy * gdt;
      if (Math.hypot(bm.tx - bm.x, bm.ty - bm.y) < 10) bm.arrived = true;
    }
    if (Math.hypot(bm.x - B.x, bm.y - B.y) < B.r * 0.92 + bm.hitR){ die('サボテンに触れてバブル崩壊'); return; }
    if (bm.fuse <= 0){ burstBomb(bm); bombs.splice(i, 1); }
  }

  // ---- コイン（配当） ----
  for (let i = coins.length - 1; i >= 0; i--){
    const c = coins[i];
    c.t += gdt;
    // マグネット：お金はバブルに吸い寄せられる
    const dx = B.x - c.x, dy = B.y - c.y, d = Math.hypot(dx, dy);
    if (d < 150 && d > 1){ c.x += dx / d * 130 * gdt; c.y += dy / d * 130 * gdt; }
    if (d < B.r + 18){
      const bonus = Math.floor(400 * mult);
      score += bonus;
      popup(c.x, c.y - 10, `+${yen(bonus).slice(1)} 配当💰`, '#ffe08a', 18);
      sndCoin();
      for (let k = 0; k < 10; k++){
        const a = R(0, TAU), sp = R(40, 180);
        parts.push({ x: c.x, y: c.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, g: 240, drag: 1.5,
          rot: R(0, TAU), vr: R(-6, 6), sz: R(2, 4), c: '#ffd166', t: 0, life: 0.6, shape: 'rect' });
      }
      coins.splice(i, 1); continue;
    }
    if (c.t > c.life){ coins.splice(i, 1); }
  }
}

function updateFx(gdt){
  for (let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.t += gdt;
    if (p.t > p.life){ parts.splice(i, 1); continue; }
    p.vy += (p.g || 0) * gdt;
    const dr = Math.exp(-(p.drag || 0) * gdt);
    p.vx *= dr; p.vy *= dr;
    p.x += p.vx * gdt; p.y += p.vy * gdt;
    p.rot += (p.vr || 0) * gdt;
  }
  for (let i = rings.length - 1; i >= 0; i--){
    const r0 = rings[i];
    r0.t += gdt;
    if (r0.t > r0.life){ rings.splice(i, 1); continue; }
    r0.r += r0.vr * gdt;
  }
  for (let i = popups.length - 1; i >= 0; i--){
    const p = popups[i];
    p.t += gdt;
    if (p.t > p.life) popups.splice(i, 1);
  }
}

function drawBG(){

  // 塵
  for (const d of dust){
    const y = ((d.y * H - tReal * d.s) % H + H) % H;
    ctx.globalAlpha = d.a;
    ctx.fillStyle = '#ffd9ec';
    ctx.beginPath(); ctx.arc(d.x * W, y, d.r, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawNeedle(n){
  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.rotate(n.rot);
  ctx.fillStyle = n.col;
  ctx.beginPath();
  ctx.moveTo(n.len * 0.6, 0);
  ctx.lineTo(-n.len * 0.4, n.w);
  ctx.lineTo(-n.len * 0.6, 0);
  ctx.lineTo(-n.len * 0.4, -n.w);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(n.len * 0.42, 0, 1.9, 0, TAU); ctx.fill();

}
function drawBomb(bm){
  ctx.save();
  ctx.translate(bm.x, bm.y);
  ctx.rotate(Math.sin(bm.t * 6) * 0.15);
  // 起爆予告リング
  if (bm.fuse < 1.4){
    const p = clamp(bm.fuse / 1.4, 0, 1);

    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 22 + p * 34, 0, TAU); ctx.stroke();
  }
  ctx.font = `34px ${EMOJI}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🌵', 0, 0);
  if (bm.fuse < 1.4 && Math.sin(tReal * 16) > 0){
    ctx.font = F(16);

    ctx.fillText('⚠', 0, -32);
  }
  ctx.restore();
}
function drawCoin(c){
  const bobY = Math.sin(c.t * 3 + c.ph) * 5;
  const blink = c.life - c.t < 2 ? (Math.sin(c.t * 14) > 0 ? 1 : 0.25) : 1;
  ctx.save();
  ctx.translate(c.x, c.y + bobY);
  ctx.globalAlpha = blink;
  const g = ctx.createRadialGradient(0, 0, 2, 0, 0, 30);
  g.addColorStop(0, 'rgba(255,220,120,0.5)');
  g.addColorStop(1, 'rgba(255,220,120,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, 30, 0, TAU); ctx.fill();
  let sx = Math.sin(c.t * 3.2 + c.ph);
  sx = Math.sign(sx || 1) * Math.max(Math.abs(sx), 0.18);
  ctx.scale(sx, 1);
  ctx.font = `28px ${EMOJI}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🪙', 0, 0);
  ctx.restore();
}
function drawBalloon(){
  const t = clamp((B.r - MINR) / (MAXR - MINR), 0, 1);
  const col = t < 0.55 ? lerpC(PINK, GOLD, t / 0.55) : lerpC(GOLD, RED, (t - 0.55) / 0.45);
  const warning = B.r > MAXR * 0.85;
  const sp = Math.min(Math.hypot(B.vx, B.vy) / 700, 0.22);
  const ang = Math.atan2(B.vy, B.vx);
  const breathe = 1 + Math.sin(tReal * 8) * 0.015 + (warning ? Math.sin(tReal * 34) * 0.03 : 0);

  ctx.save();
  ctx.translate(B.x, B.y);

  // グレイズ判定リング（薄く常時表示）
  ctx.save();
  ctx.strokeStyle = grazeCombo > 0 ? `rgba(255,209,102,${0.3 + Math.sin(tReal * 12) * 0.15})` : 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 8]);
  ctx.beginPath(); ctx.arc(0, 0, B.r + GRAZE, 0, TAU); ctx.stroke();
  ctx.restore();

  ctx.rotate(ang); ctx.scale((1 + sp) * breathe, (1 - sp) * breathe); ctx.rotate(-ang);

  // 本体
  const g = ctx.createRadialGradient(-B.r * 0.35, -B.r * 0.4, B.r * 0.1, 0, 0, B.r * 1.05);
  g.addColorStop(0, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.25, rgb(lerpC(col, [255,255,255], 0.35)));
  g.addColorStop(0.8, rgb(col));
  g.addColorStop(1, rgb(lerpC(col, [40,10,50], 0.35)));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, B.r, 0, TAU); ctx.fill();

  // 結び目＋ひも
  const jd = B.jetDir;
  const kx = jd.x * B.r, ky = jd.y * B.r;
  const ka = Math.atan2(jd.y, jd.x);
  ctx.save();
  ctx.translate(kx, ky); ctx.rotate(ka);
  ctx.fillStyle = rgb(lerpC(col, [40,10,50], 0.3));
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(9, -6); ctx.lineTo(9, 6); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(kx, ky);
  const sl = 34 + B.r * 0.4;
  const wig = Math.sin(tReal * 6) * 10;
  ctx.quadraticCurveTo(kx + jd.x * sl * 0.5 + wig, ky + jd.y * sl * 0.5,
                       kx + jd.x * sl - wig * 0.6, ky + jd.y * sl);
  ctx.stroke();

  // 顔
  const lookD = Math.hypot(B.vx, B.vy);
  const lx = lookD > 10 ? B.vx / lookD : 0, ly = lookD > 10 ? B.vy / lookD : 0;
  const er = Math.max(B.r * 0.09, 2.6);
  ctx.fillStyle = '#2b1b3a';
  for (const s of [-1, 1]){
    const ex = s * B.r * 0.3, ey = -B.r * 0.12;
    if (warning){ // ＞＜ 目
      ctx.save();
      ctx.strokeStyle = '#2b1b3a'; ctx.lineWidth = Math.max(B.r * 0.045, 2); ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ex - er * s, ey - er); ctx.lineTo(ex + er * s, ey);
      ctx.moveTo(ex - er * s, ey + er); ctx.lineTo(ex + er * s, ey);
      ctx.stroke();
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(ex + lx * er * 0.7, ey + ly * er * 0.7, er, 0, TAU); ctx.fill();
    }
  }
  // 口
  ctx.strokeStyle = '#2b1b3a'; ctx.lineWidth = Math.max(B.r * 0.04, 1.8); ctx.lineCap = 'round';
  ctx.beginPath();
  if (warning){
    const mw = B.r * 0.16;
    ctx.moveTo(-mw, B.r * 0.22);
    for (let i = 1; i <= 4; i++) ctx.lineTo(-mw + (i / 4) * mw * 2, B.r * 0.22 + (i % 2 ? -1 : 1) * B.r * 0.05);
  } else {
    ctx.arc(0, B.r * 0.12, B.r * 0.16, 0.25 * Math.PI, 0.75 * Math.PI);
  }
  ctx.stroke();
  // ほっぺ・汗
  if (t > 0.45){
    ctx.fillStyle = 'rgba(255,90,120,0.4)';
    ctx.beginPath(); ctx.arc(-B.r * 0.48, B.r * 0.08, B.r * 0.12, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc( B.r * 0.48, B.r * 0.08, B.r * 0.12, 0, TAU); ctx.fill();
  }
  if (warning){
    ctx.fillStyle = 'rgba(140,200,255,0.9)';
    const sy = -B.r * 0.55 + Math.sin(tReal * 10) * 2;
    ctx.beginPath();
    ctx.moveTo(B.r * 0.55, sy - 7);
    ctx.quadraticCurveTo(B.r * 0.55 + 6, sy + 3, B.r * 0.55, sy + 6);
    ctx.quadraticCurveTo(B.r * 0.55 - 6, sy + 3, B.r * 0.55, sy - 7);
    ctx.fill();
  }
  ctx.restore();
}
function drawParts(){
  for (const p of parts){
    const a = clamp(1 - p.t / p.life, 0, 1);
    ctx.globalAlpha = a;
    if (p.shape === 'rect'){
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.sz / 2, -p.sz / 3, p.sz, p.sz * 0.66);
      ctx.restore();
    } else {
      ctx.fillStyle = p.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * a, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  for (const r0 of rings){
    const a = clamp(1 - r0.t / r0.life, 0, 1);
    ctx.globalAlpha = a;
    ctx.strokeStyle = r0.c; ctx.lineWidth = r0.w * a + 0.5;
    ctx.beginPath(); ctx.arc(r0.x, r0.y, Math.max(r0.r, 0.1), 0, TAU); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

/* ---------- メインループ ---------- */
let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let rdt = Math.min((now - last) / 1000, 0.05);
  last = now;
  tReal += rdt;

  let gdt = rdt;
  if (state === 'play'){
    if (paused) gdt = 0;
    if (gdt > 0){ simulate(gdt); }
  } else if (state === 'dying'){
    dyingT += rdt;
    gdt = rdt * (dyingT < 0.12 ? 0 : 0.22);   // ヒットストップ→スローモーション
    // 針・爆弾はスローで流し続ける（風船は消滅）
    for (const n of needles){
      n.t += gdt;
      if (n.type === 'sine'){ n.x += n.vx * gdt; n.y = n.y0 + Math.sin(n.t * n.f + n.ph) * n.A; }
      else { n.x += n.vx * gdt; n.y += n.vy * gdt; }
    }
    if (ventGain && AC) ventGain.gain.setTargetAtTime(0, AC.currentTime, 0.02);
    if (dyingT > 1.5){ state = 'over'; overT = 0; }
  } else if (state === 'over'){
    overT += rdt;
  }
  updateFx(state === 'dying' ? gdt : rdt * (paused && state === 'play' ? 0 : 1));
  shake = Math.max(0, shake - shake * 7 * rdt - 2 * rdt);
  if (bannerT > 0) bannerT -= rdt;

  /* ---- 描画 ---- */
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  const sx = R(-shake, shake), sy = R(-shake, shake);
  ctx.translate(sx, sy);

  drawBG();
  for (const c of coins) drawCoin(c);
  for (const bm of bombs) drawBomb(bm);
  for (const n of needles) drawNeedle(n);
  if (state === 'play') drawBalloon();
  drawParts();
  drawPopups();

  if (state === 'play' || state === 'dying') drawHUD();
  if (state === 'title') drawTitle();
  if (state === 'over') drawOver();
  if (paused && state === 'play'){
    ctx.fillStyle = 'rgba(15,8,30,0.55)';
    ctx.fillRect(-20, -20, W + 40, H + 40);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = F(30); ctx.fillStyle = '#fff';
    ctx.fillText('⏸ 一時停止中（Pで再開）', W / 2, H / 2);
  }

  // ビネット
  const v = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.45, W / 2, H / 2, Math.max(W, H) * 0.75);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(10,4,24,0.45)');
  ctx.fillStyle = v;
  ctx.fillRect(-20, -20, W + 40, H + 40);
}
requestAnimationFrame(frame);

/* ---------- デバッグ用フック（検証で使用・プレイに影響なし） ---------- */
window.GAME = {
  get state(){ return state; },
  get score(){ return Math.floor(score); },
  get level(){ return level; },
  get needleCount(){ return needles.length; },
  start(){ if (state !== 'play') startGame(); },
  addTime(s){ elapsed += s; },
  pop(){ die('デバッグ'); },
};
</script>
